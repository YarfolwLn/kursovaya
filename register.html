<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Wishlist</title>
    <link rel="stylesheet" href="styles.css?v=1.0.0">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎁 Мой Wishlist</h1>
            <nav>
                <button id="themeToggle" class="btn btn-outline">🌙 Тёмная</button>
                <a href="index.html" class="btn btn-outline">Главная</a>
                <a href="login.html" class="btn btn-primary">Войти</a>
            </nav>
        </header>
        
        <main>
            <section class="auth-form">
                <div class="form-card">
                    <h2>Создание аккаунта</h2>
                    <form id="registerForm">
                        <div class="form-group">
                            <label for="name">Имя</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Пароль</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Подтвердите пароль</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">Зарегистрироваться</button>
                    </form>
                    <p class="auth-link">
                        Уже есть аккаунт? <a href="login.html">Войдите</a>
                    </p>
                </div>
            </section>
        </main>
    </div>
    
    <script src="script.js?v=1.0.0"></script>
</body>
</html>
