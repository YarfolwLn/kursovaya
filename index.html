<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - Мои желания</title>
    <link rel="stylesheet" href="styles.css?v=1.0.0">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎁 Мой Wishlist</h1>
            <nav>
                <button id="themeToggle" class="btn btn-outline">🌙 Тёмная</button>
                <a href="login.html" class="btn btn-outline">Войти</a>
                <a href="register.html" class="btn btn-primary">Регистрация</a>
            </nav>
        </header>
        
        <main>
            <section class="hero">
                <h2>Создай свой список желаний</h2>
                <p>Добавляй подарки, оценивай их по важности и делись с близкими</p>
                <a href="register.html" class="btn btn-large btn-primary">Начать сейчас</a>
            </section>
            
            <section class="features">
                <div class="feature-card">
                    <div class="feature-icon">⭐</div>
                    <h3>Оценивай важность</h3>
                    <p>Отмечай подарки от 1 до 5 звезд</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">📝</div>
                    <h3>Добавляй желания</h3>
                    <p>Создавай свой персональный список</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">👥</div>
                    <h3>Делись с друзьями</h3>
                    <p>Покажи свой список близким</p>
                </div>
            </section>
        </main>
    </div>
    
    <script src="script.js?v=1.0.0"></script>
</body>
</html>
